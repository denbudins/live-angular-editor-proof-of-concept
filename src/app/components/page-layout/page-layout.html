<div class="layout">
  <header class="topbar">
    <div class="topbar-right">
      <div class="compile-status">
        <span class="dot"></span>
        <span>Compiled ✓</span>
      </div>

      <button class="btn-run" (click)="onClickRun()">
        <svg width="11" height="11" viewBox="0 0 12 12">
          <path d="M2 1.5l8 4.5-8 4.5V1.5z" fill="currentColor" />
        </svg>
        Run
      </button>
    </div>
  </header>

  <div class="panels">
    <!-- Left panel — Angular preview -->
    <div class="panel panel-preview" [style.width.%]="100 - editorPct() - 0.3">
      <app-preview-component #previewHost [code]="this.componentCode()" />
    </div>

    <!-- Splitter -->
    <div class="splitter" role="separator" aria-orientation="vertical">
      <div class="splitter-handle"></div>
    </div>

    <!-- Right panel — Monaco editor with tabs -->
    <div class="panel panel-editor" [style.width.%]="editorPct()">
      <app-monaco-editor
        #editorPanel
        [tsPath]="tsPath()"
        [htmlPath]="htmlPath()"
        [scssPath]="scssPath()"
      ></app-monaco-editor>
    </div>
  </div>

  <app-editor-status-bar />
</div>
